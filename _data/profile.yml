short_bio: >-
  <p>
    I am an incoming Ph.D. student in the Individualized Interdisciplinary Program at the Hong Kong University of Science and Technology, advised by Dr. Sirui Han and Dr. Anyi Rao. My research interests include embodied AI, autonomous driving, multimodal large language models, and 3D perception.
  </p>
  <p>
    Previously, I received my master's degree in Computer Technology from Tsinghua University, where I worked with Prof. Chun Yuan on occupancy perception for autonomous driving and multimodal models for embodied intelligence.
  </p>

