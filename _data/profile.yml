short_bio: >-
  <p>
    I work on embodied AI, robotics, autonomous driving, and 3D perception. My research focuses on building reliable perception and reasoning systems for real-world embodied agents, including occupancy prediction, LiDAR anomaly detection, world models, and multimodal safety-critical reasoning.
  </p>
  <p>
    Recent projects include weakly supervised 3D Gaussian Splatting for occupancy prediction, synthetic-data-driven LiDAR outlier detection, efficient 4D world-action models, and laboratory safety benchmarks for multimodal agents.
  </p>

